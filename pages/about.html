<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About · The Human Brain</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    :root { --region-color: #7dd3c8; }

    .about-banner {
      background: linear-gradient(135deg, #0d1520 0%, #001518 100%);
    }

    .about-banner-bg {
      background: radial-gradient(ellipse at 30% 50%, rgba(125,211,200,0.2) 0%, transparent 70%),
                  radial-gradient(ellipse at 80% 20%, rgba(79,163,224,0.1) 0%, transparent 60%);
    }

    .brain-diagram-img {
      width: 100%;
      max-width: 600px;
      display: block;
      margin: 0 auto 2.5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      opacity: 0.85;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    .region-links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem;
      margin: 1.5rem 0 2rem;
    }

    .region-link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      text-decoration: none;
      transition: all 0.25s;
    }

    .region-link-card:hover {
      transform: translateX(4px);
      border-color: var(--link-color);
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      background: var(--surface2);
    }

    .region-link-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .region-link-card span {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.25s;
    }

    .region-link-card:hover span {
      color: var(--heading);
    }

    .region-link-arrow {
      margin-left: auto;
      color: var(--text-dim);
      font-size: 0.8rem;
      transition: all 0.25s;
    }

    .region-link-card:hover .region-link-arrow {
      color: var(--heading);
      transform: translateX(3px);
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin: 1.5rem 0 2rem;
    }

    .fact-item {
      background: var(--surface);
      padding: 1.5rem;
      text-align: center;
      transition: background 0.2s;
    }

    .fact-item:hover { background: var(--surface2); }

    .fact-number {
      font-family: 'Space Mono', monospace;
      font-size: 1.6rem;
      color: var(--accent2);
      display: block;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 20px rgba(125,211,200,0.4);
    }

    .fact-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .how-to-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .how-to-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
      transition: all 0.25s;
    }

    .how-to-card:hover {
      border-color: var(--accent2);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    }

    .how-to-number {
      font-family: 'Space Mono', monospace;
      font-size: 2.5rem;
      color: var(--border);
      position: absolute;
      top: 0.5rem;
      right: 1rem;
      line-height: 1;
      font-weight: 700;
    }

    .how-to-card h3 {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 0.6rem;
      position: relative;
    }

    .how-to-card p {
      font-size: 0.95rem;
      color: var(--text-dim);
      margin: 0;
      position: relative;
    }
  </style>
</head>
